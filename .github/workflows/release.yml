name: Release

"on":
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          # Node 22 ships npm 10, which hard-errors (EBADPLATFORM) on lightningcss's
          # platform-gated optional deps being mis-recorded as non-optional in the
          # lockfile (npm/cli#7834). npm 11 tolerates it. Upgrade before `npm ci`.
          npm install -g npm@11
          npm ci

      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag" != "v${pkg_version}" ]; then
            echo "Tag ${tag} does not match package.json version v${pkg_version}"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Zip (Web Store format)
        run: npm run zip

      - name: Build folder-wrapped zip for unpacked installs
        run: |
          name="${GITHUB_REPOSITORY##*/}"
          ver="$(node -p "require('./package.json').version")"
          mkdir -p .output/pack && rm -rf ".output/pack/$name"
          cp -r .output/chrome-mv3 ".output/pack/$name"
          ( cd .output/pack && zip -r "$GITHUB_WORKSPACE/${name}-${ver}.zip" "$name" )

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          name="${GITHUB_REPOSITORY##*/}"
          ver="$(node -p "require('./package.json').version")"
          # Idempotent: create the release if it doesn't exist yet, otherwise just
          # re-upload the assets. (--clobber is a `release upload` flag, not `create`.)
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${name}-${ver}.zip" .output/*-chrome.zip --clobber
          else
            gh release create "$tag" "${name}-${ver}.zip" .output/*-chrome.zip --generate-notes
          fi
